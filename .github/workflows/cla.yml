name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: cla-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: "https://github.com/dataiku/kiji-proxy/blob/1f172d2a29fc570e5bf326e7915eb28dc0cc9809/.github/cla/CLA.md"
          path-to-signatures: "signatures/v1/cla.json"
          branch: "cla-signatures"
          allowlist: "*[bot]"
          create-file-commit-message: "chore(cla): create signatures file"
          signed-commit-message: "chore(cla): @$contributorName signed in #$pullRequestNo"

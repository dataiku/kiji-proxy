# PII Detection Model Training Configuration
# All pipeline settings are controlled via this file.

[model]
name = "microsoft/deberta-v3-base"

[training]
num_epochs = 30
batch_size = 128
learning_rate = 2e-5
bf16 = true                # Mixed precision for Ampere+ GPUs (H100, A100, etc.)
torch_compile = false      # Keep torch.compile disabled during training

warmup_steps = 500        # Gradual LR ramp-up to stabilize early training
weight_decay = 0.01       # L2 regularization strength
auxiliary_ce_loss_weight = 0.2  # Weighted token CE added to CRF loss for rare labels

# Early stopping settings
max_eval_samples = 0            # Cap eval set size for faster evaluation (0 = no cap)
balanced_validation_split = true
early_stopping_enabled = true
early_stopping_patience = 3   # Number of epochs with no improvement before stopping
early_stopping_threshold = 0.005  # Minimum improvement (0.5%) to qualify as improvement

[paths]
# Directory containing JSON training samples (relative to working directory or absolute)
training_samples_dir = "model/dataset/data_samples/training_samples"
output_dir = "model/trained"

[labelstudio]
# Label Studio base url
base_url = "http://localhost:8080"
# ID of the label studio project
project_id = 6


[data]
# Limit samples for quick iteration (0 = use all)
subsample_count = 0
# ai4privacy/pii-masking-300k samples to add (-1 = none, 0 = all)
num_ai4privacy_samples = -1
# Path to audit ledger TSV to filter training samples (empty = no filtering)
# Relative paths are resolved from the project root.
# Generate with: uv run python model/dataset/audit_dataset.py --samples-dir <dir>
audit_allowlist = "model/dataset/data_samples/training_samples/audit_ledger.tsv"

[pipeline]
# Skip Label Studio export and use existing data from paths.training_samples_dir
skip_export = true
# Skip variant generation (fp32 export still runs). Default: build all variants.
skip_quantization = false
# Skip model signing (fp32 + every variant gets signed otherwise)
skip_signing = false

# Variants to build. Comma-separated names from model/src/quantize_variants.py,
# or "all". Default omits int8_static (slow, needs calibration) and the
# *_reduce_range / matmul_weight_only experiments.
quantization_variants = "fp32,fp16,int8_dyn_default,int8_dyn_avx512_vnni,int8_dyn_avx512,int8_dyn_avx2,int4_rtn_block32,int4_rtn_block128,int4_hqq_block64"

# Sweep eval knobs — passed to tests.benchmark.sweep_quants
sweep_num_samples = 1000
sweep_seed = 42

# Primary variant gating: pipeline fails if this variant's exact-span F1
# drops below the threshold. Defaults match what build_dmg.sh ships.
primary_variant = "fp16"
primary_variant_min_f1 = 0.85
